version: '3.8'
services:
  labo-ai:
    build: .
    ports:
      - "8888:8888"
    volumes:
      - .:/app
    env_file:
      - .env

  backend:
    build: 
      context: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./data:/app/data
    env_file:
      - .env